name: Jiff E2E Tests

# ── Triggers ───────────────────────────────────────────────────────
on:
  workflow_dispatch:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ── Jobs ───────────────────────────────────────────────────────────
jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:

      # 1. Check out the code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Install app dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install Playwright and Chromium only (faster in CI)
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # 5. Wait for the Vercel preview deployment to be ready
      #    Uses the official Vercel action to get the preview URL
      - name: Wait for Vercel preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel_preview
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300       # wait up to 5 minutes
          check_interval: 10
        # This step is skipped on direct pushes to main if you only
        # want to test the production URL — set PLAYWRIGHT_BASE_URL
        # as a GitHub secret to always use a fixed URL instead.
        continue-on-error: true  # don't fail if preview URL not found

      # 6. Run the tests
      #    Priority order for base URL:
      #      a. Preview URL from Vercel action (PRs)
      #      b. PLAYWRIGHT_BASE_URL secret (always available)
      #      c. Production URL fallback
      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel_preview.outputs.url || secrets.PLAYWRIGHT_BASE_URL || 'https://jiff-ecru.vercel.app' }}
        run: npx playwright test --project=chromium

      # 7. Upload HTML report as artifact (always — even on failure)
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      # 8. Upload test results XML (for GitHub test annotations)
      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 14

      # 9. Post test summary as a PR comment
      - name: Post test summary
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const conclusion = '${{ job.status }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const emoji = conclusion === 'success' ? '✅' : '❌';
            const body = [
              `## ${emoji} Jiff E2E Tests — ${conclusion === 'success' ? 'All Passed' : 'Some Failed'}`,
              '',
              `**Run:** [#${{ github.run_number }}](${runUrl})`,
              `**Commit:** \`${{ github.sha }}\``,
              `**Branch:** \`${{ github.head_ref }}\``,
              '',
              conclusion === 'success'
                ? '✓ All 12 test cases passed. Safe to merge.'
                : '✗ One or more tests failed. Check the [test report](' + runUrl + ') for details.',
              '',
              '_Download the HTML report artifact to see screenshots and traces for any failures._',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
